<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito - Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
    
</head>
<body class="login-page">
    <div class="login-card">
        <h2>Admin</h2>
        <p>Insira suas credenciais para acessar o painel</p>

        {% if erro %}
            <div class="error-msg">{{ erro }}</div>
        {% endif %}

        <form method="POST" class="contact__form">
            <div class="form__group" style="margin-bottom: 20px;">
                <label>Usuário</label>
                <input type="text" name="username" placeholder="Seu usuário" required>
            </div>
            <div class="form__group" style="margin-bottom: 30px;">
                <label>Senha</label>
                <input type="password" name="password" placeholder="••••••••" required autocomplete="off">
            </div>
            <button type="submit" class="btn btn--primary btn--full">Acessar Dashboard</button>
        </form>

        <a href="/" class="back-link">← Voltar ao site</a>
    </div>
</body>
</html>
